<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sala | Presentes Joao Pedro e Jessica</title>
    <link rel="stylesheet" href="../../styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
    <script src="../../script.js" defer></script>
  </head>
  <body>
    <main class="subpage">
      <nav class="subnav">
        <strong>Joao Pedro e Jessica</strong>
        <div>
          <a href="../../">Convite</a>
          <a href="../">Todos os presentes</a>
          <a href="../../presenca/">Presenca</a>
        </div>
      </nav>
      <section class="sub-hero">
        <div>
          <p class="eyebrow dark">Presentes de sala</p>
          <h1>Sala</h1>
          <p>Itens simbolicos para montar um lar bonito e aconchegante.</p>
        </div>
        <figure class="sub-hero-card">
          <img src="https://images.unsplash.com/photo-1604014237800-1c9102c219da?auto=format&fit=crop&w=1100&q=82" alt="Sala decorada" />
        </figure>
      </section>
      <section class="gift-page-layout">
        <div class="gift-panel">
          <div class="gift-tabs"><button class="is-active" type="button" data-filter="sala">Sala</button></div>
          <div class="gift-grid" id="giftGrid"></div>
        </div>
        <aside class="pix-checkout">
          <div class="pix-box"><span id="selectedGift">Escolha um presente</span><strong>Pix para Joao Pedro</strong></div>
          <div class="pix-qr" id="pixQr"></div>
          <label for="pixCopy">Pix copia e cola</label>
          <textarea class="pix-copy" id="pixCopy" readonly></textarea>
          <button class="icon-button" id="copyPix" type="button"><i data-lucide="copy"></i>Copiar Pix</button>
          <p class="gift-note" id="giftNote">Escolha um objeto para gerar o QR Code.</p>
        </aside>
      </section>
    </main>
  </body>
</html>
