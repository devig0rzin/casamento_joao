<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirmar Presenca | Joao Pedro e Jessica</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="../script.js" defer></script>
  </head>
  <body>
    <main class="subpage">
      <nav class="subnav">
        <strong>Joao Pedro e Jessica</strong>
        <div>
          <a href="../">Convite</a>
          <a href="../local/">Local</a>
          <a href="../presentes/">Presentes</a>
        </div>
      </nav>

      <section class="sub-hero">
        <div>
          <p class="eyebrow dark">Confirmar presenca</p>
          <h1>Seu nome na lista</h1>
          <p>Preencha seus dados. O sistema salva a confirmacao localmente e prepara a mensagem para enviar ao Joao Pedro ou a Jessica pelo WhatsApp.</p>
        </div>
        <figure class="sub-hero-card">
          <img src="https://images.unsplash.com/photo-1507504031003-b417219a0fde?auto=format&fit=crop&w=1100&q=82" alt="Mesa de casamento elegante" />
        </figure>
      </section>

      <section class="rsvp-layout">
        <form class="rsvp-form" id="rsvpForm">
          <label for="guestName">Nome completo</label>
          <input id="guestName" name="guestName" type="text" autocomplete="name" required />

          <label for="guestCount">Quantidade de pessoas</label>
          <select id="guestCount" name="guestCount">
            <option value="1">1 pessoa</option>
            <option value="2">2 pessoas</option>
            <option value="3">3 pessoas</option>
            <option value="4">4 pessoas</option>
            <option value="5">5 pessoas</option>
          </select>

          <label for="guestMessage">Mensagem para os noivos</label>
          <textarea id="guestMessage" name="guestMessage" rows="4"></textarea>

          <button class="button primary full" type="submit">
            <i data-lucide="send" aria-hidden="true"></i>
            Registrar confirmacao
          </button>
          <div class="rsvp-actions">
            <a class="button secondary" id="sendJoao" href="#" target="_blank" rel="noreferrer" hidden>Enviar para Joao</a>
            <a class="button secondary" id="sendJessica" href="#" target="_blank" rel="noreferrer" hidden>Enviar para Jessica</a>
          </div>
          <p class="form-status" id="formStatus" role="status" aria-live="polite"></p>
        </form>

        <aside class="guest-list" aria-label="Lista de presenca">
          <div class="guest-list-header">
            <h3>Lista confirmada</h3>
            <span id="guestTotal">0 pessoas</span>
          </div>
          <ul id="guestList"></ul>
        </aside>
      </section>
    </main>
  </body>
</html>
