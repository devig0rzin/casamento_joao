<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local | Joao Pedro e Jessica</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="../script.js" defer></script>
  </head>
  <body>
    <main class="subpage">
      <nav class="subnav">
        <strong>Joao Pedro e Jessica</strong>
        <div>
          <a href="../">Convite</a>
          <a href="../presenca/">Presenca</a>
          <a href="../presentes/">Presentes</a>
        </div>
      </nav>

      <section class="sub-hero">
        <div>
          <p class="eyebrow dark">Sobre o local</p>
          <h1>Paroquia Santa Cruz</h1>
          <p>R. Balao Magico, 1506 - Rio Cotia, Cotia - SP, 06715-780</p>
          <div class="location-actions">
            <a
              class="button primary"
              href="https://www.google.com/maps/place/R.+Bal%C3%A3o+M%C3%A1gico,+1506+-+Rio+Cotia,+Cotia+-+SP,+06715-780"
              target="_blank"
              rel="noreferrer"
            >
              <i data-lucide="navigation" aria-hidden="true"></i>
              Abrir rota no Google Maps
            </a>
            <a class="button secondary" href="../presenca/">
              <i data-lucide="user-check" aria-hidden="true"></i>
              Confirmar presenca
            </a>
          </div>
        </div>
        <figure class="sub-hero-card">
          <img src="https://images.unsplash.com/photo-1520854221256-17451cc331bf?auto=format&fit=crop&w=1100&q=82" alt="Igreja preparada para casamento" />
        </figure>
      </section>

      <section class="map-panel" aria-label="Mapa do endereco">
        <iframe
          title="Mapa para Paroquia Santa Cruz"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps?q=R.%20Bal%C3%A3o%20M%C3%A1gico%2C%201506%20-%20Rio%20Cotia%2C%20Cotia%20-%20SP%2C%2006715-780&output=embed"
        ></iframe>
      </section>
    </main>
  </body>
</html>
